<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 32 32">
  <defs>
    <clipPath id="top"><rect x="0" y="0" width="32" height="15"/></clipPath>
    <clipPath id="bot"><rect x="0" y="17" width="32" height="15"/></clipPath>
  </defs>
  <!-- Background -->
  <rect width="32" height="32" rx="4" fill="#080610"/>
  <!-- Border -->
  <rect width="32" height="32" rx="4" fill="none" stroke="#b97ef8" stroke-width="1.5"/>
  <!-- Glitch layer — gold, bottom half, offset right -->
  <text x="17.5" y="23" font-family="system-ui, sans-serif" font-weight="800" font-size="15"
    fill="#fbbf24" text-anchor="middle" clip-path="url(#bot)" opacity="0.85">JG</text>
  <!-- Glitch layer — purple, top half, offset left -->
  <text x="14.5" y="21" font-family="system-ui, sans-serif" font-weight="800" font-size="15"
    fill="#a855f7" text-anchor="middle" clip-path="url(#top)" opacity="0.85">JG</text>
  <!-- Main text -->
  <text x="16" y="22" font-family="system-ui, sans-serif" font-weight="800" font-size="15"
    fill="#b97ef8" text-anchor="middle">JG</text>
</svg>
